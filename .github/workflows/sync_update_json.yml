name: Sync Update JSON
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Parse Version
        id: get_version
        run: |
          # Strip leading 'v' if present (e.g. v1.4.0 -> 1.4.0)
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update JSON
        run: |
          # Using jq to safely update latest_version in the existing json
          cd den_website
          jq --arg v "${{ steps.get_version.outputs.version }}" '.latest_version = $v' update.json > tmp.json && mv tmp.json update.json
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add den_website/update.json
          git commit -m "chore: auto-update den_website/update.json to version ${{ steps.get_version.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push
